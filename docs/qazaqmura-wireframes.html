<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Qazaq Mūra — Wireframes v1.0</title>
<style>
  :root{
    --ink:#111; --line:#111; --mid:#8a8a8a; --faint:#c9c9c9; --panel:#f4f4f4; --paper:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#e9e9e9;font-family:'Helvetica Neue',Arial,sans-serif;color:var(--ink);}
  .app{display:flex;height:100vh;}

  /* ---- SIDEBAR ---- */
  .sidebar{width:280px;min-width:280px;background:#fafafa;border-right:1px solid #ccc;overflow-y:auto;padding:16px 0 60px;}
  .brand{padding:0 16px 14px;border-bottom:1px solid #ddd;margin-bottom:8px;}
  .brand h1{font-size:14px;margin:0 0 2px;letter-spacing:.04em;text-transform:uppercase;}
  .brand p{font-size:10px;color:var(--mid);margin:0;}
  .group-title{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--mid);padding:14px 16px 4px;}
  .nav-item{display:flex;align-items:center;gap:8px;padding:6px 16px;font-size:12px;cursor:pointer;color:#333;border-left:3px solid transparent;}
  .nav-item:hover{background:#eee;}
  .nav-item.active{background:#e4e4e4;border-left-color:#111;font-weight:600;}
  .nav-item .n{width:16px;height:16px;border:1px solid #999;border-radius:50%;font-size:8px;display:flex;align-items:center;justify-content:center;color:#777;flex:none;}
  .badge{font-size:8px;border:1px solid #aaa;border-radius:3px;padding:1px 4px;color:#888;margin-left:auto;text-transform:uppercase;}

  /* ---- MAIN ---- */
  .main{flex:1;overflow-y:auto;padding:28px 40px 80px;}
  .crumbs{font-size:10px;color:var(--mid);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
  .screen-title{font-size:20px;font-weight:700;margin:0 0 4px;}
  .screen-desc{font-size:12.5px;color:#555;max-width:760px;line-height:1.5;margin-bottom:22px;}
  .frame-wrap{display:flex;justify-content:flex-start;}
  .frame-shell{background:#dcdcdc;padding:22px;border-radius:6px;display:inline-block;}
  .frame-shell .fname{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}

  .wf-frame{position:relative;background:var(--paper);border:1.5px solid var(--line);overflow:hidden;}
  .wf-frame.desktop{width:1040px;height:660px;}
  .wf-frame.mobile{width:340px;height:700px;}

  .wf-el{position:absolute;box-sizing:border-box;overflow:hidden;}
  .tag{position:absolute;top:-1px;left:-1px;background:#111;color:#fff;font-size:7.5px;padding:1px 4px;letter-spacing:.03em;text-transform:uppercase;line-height:1.4;z-index:5;white-space:nowrap;}
  .wf-bar{border:1.3px solid var(--line);background:#fff;}
  .wf-panel{border:1.3px solid var(--line);background:var(--panel);}
  .wf-btn{border:1.3px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;text-align:center;padding:2px 4px;}
  .wf-btn.primary{background:#111;color:#fff;border-color:#111;}
  .wf-btn.ghost{border-style:dashed;color:#555;}
  .wf-input{border:1.3px solid var(--line);background:#fff;display:flex;align-items:center;padding:0 8px;font-size:10.5px;color:#999;}
  .wf-pill{border:1px solid var(--line);border-radius:20px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;padding:0 6px;white-space:nowrap;}
  .wf-icon{border:1.3px solid var(--line);border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:700;text-align:center;line-height:1.1;}
  .wf-img{border:1.3px solid var(--line);background-image:repeating-linear-gradient(45deg,#dcdcdc,#dcdcdc 5px,#fff 5px,#fff 10px);display:flex;align-items:center;justify-content:center;font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.05em;}
  .wf-text{padding:2px 2px;display:flex;flex-direction:column;justify-content:center;gap:4px;}
  .wf-text .ln{height:6px;background:#d5d5d5;border-radius:1px;}
  .wf-text .ln.title{height:9px;background:#9c9c9c;}
  .wf-divider{border-top:1px dashed #bbb;}
  .wf-check{border:1.3px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:9px;}
  .wf-star{border:1px solid var(--line);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;}
  .wf-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.35);}
  .wf-modal{position:absolute;background:#fff;border:1.5px solid var(--line);}

  .flow{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;}
  .flow-step{width:190px;}
  .flow-step .mini{width:190px;height:130px;position:relative;background:#fff;border:1.3px solid var(--line);overflow:hidden;}
  .flow-step .cap{font-size:10px;font-weight:700;margin:8px 0 2px;text-transform:uppercase;letter-spacing:.02em;}
  .flow-step .sub{font-size:9.5px;color:#777;line-height:1.35;}
  .flow-arrow{align-self:center;font-size:20px;color:#999;padding:0 2px;margin-top:55px;}

  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:#c6c6c6;border-radius:5px;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="brand">
      <h1>Qazaq Mūra</h1>
      <p>Wireframes · v1.0 · grayscale, no visual design</p>
    </div>
    <div id="navtree"></div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
/* ============================================================
   MICRO WIREFRAME ENGINE
   Coordinates are % of the frame (desktop 1040x660 / mobile 340x700)
   ============================================================ */
function E(type,x,y,w,h,label,opts){
  opts=opts||{};
  return Object.assign({type:type,x:x,y:y,w:w,h:h,label:label||''},opts);
}
function renderEl(e){
  var cls='wf-el wf-'+e.type+(e.primary?' primary':'')+(e.ghost?' ghost':'');
  var style='left:'+e.x+'%;top:'+e.y+'%;width:'+e.w+'%;height:'+e.h+'%;'+(e.style||'');
  var inner='';
  if(e.type==='text'){
    var lines=e.lines||3; var arr=[];
    for(var i=0;i<lines;i++){
      var w2 = i===lines-1 ? '55%' : (i===0 && e.title? '85%':'92%');
      arr.push('<div class="ln'+(i===0&&e.title?' title':'')+'" style="width:'+w2+'"></div>');
    }
    inner='<div class="wf-text" style="height:100%">'+arr.join('')+'</div>';
  } else if(e.type==='img'){
    inner=(e.caption||'IMG');
  } else if(e.type==='btn'||e.type==='pill'||e.type==='input'||e.type==='check'||e.type==='star'){
    inner=e.caption||'';
  } else if(e.type==='icon'){
    inner=e.caption||'•';
  } else if(e.type==='bar'||e.type==='panel'){
    inner='';
  } else if(e.type==='raw'){
    inner=e.html||'';
  }
  var tag = e.label ? '<span class="tag">'+e.label+'</span>' : '';
  return '<div class="'+cls+'" style="'+style+'">'+tag+inner+'</div>';
}
function frameHtml(kind, elements){
  return '<div class="wf-frame '+kind+'">'+elements.map(renderEl).join('')+'</div>';
}

/* ---------- reusable composite generators ---------- */
function navDesktop(active, opts){
  opts=opts||{};

    E('pill',80,3.4,6,3.4,'',{caption:'Дети'}),
    E('icon',88,2.6,4,5,'Язык',{caption:'KK/RU/EN'}),
    E('icon',93,2.6,4,5,'Тема',{caption:'☾/☀'}),
    E('btn',97.5-9,9.9,0,0) // placeholder removed below
  ];
  items.pop();
  items.push(E('btn',88,9.6,9,3.6,'Профиль/вход',{caption:'Войти'}));
  items.push(E('divider',0,12.6,100,0.1));
  return items;
}
function tabBarMobile(active){
  var labels=['Discover','Карта','Гид','Паспорт','Профиль'];
  var out=[E('divider',0,93.5,100,0.1)];
  for(var i=0;i<5;i++){
    out.push(E('icon',3+i*19,95,10,4,'',{caption:labels[i]}));
  }
  return out;
}
function mobileTop(title, opts){
  opts=opts||{};
  return [
    E('icon',3,2,9,4.3,'Назад',{caption:opts.back===false?'≡':'←'}),
    E('text',15,2.6,60,3.6,'',{lines:1,title:true}),
    E('icon',88,2,9,4.3,'Действие',{caption:opts.action||'⚙'}),
    E('divider',0,7.5,100,0.1)
  ];
}
function cardGrid(x0,y0,cols,rows,cw,ch,gx,gy,label){
  var out=[];
  for(var r=0;r<rows;r++){
    for(var c=0;c<cols;c++){
      var x=x0+c*(cw+gx), y=y0+r*(ch+gy);
      out.push(E('img',x,y,cw,ch*0.55,'',{caption:'Фото'}));
      out.push(E('text',x,y+ch*0.58,cw,ch*0.18,'',{lines:2}));
      out.push(E('pill',x,y+ch*0.80,cw*0.45,ch*0.16,'',{caption:'от ₸ ····'}));
      if(r===0&&c===0&&label) out[out.length-3].label=label;
    }
  }
  return out;
}
function filterRail(x0,y0,w,h,label){
  return [
    E('panel',x0,y0,w,h,label||'Фильтры'),
    E('text',x0+1.5,y0+2,w-3,3,'',{lines:1,title:true}),
    E('pill',x0+1.5,y0+6,w-3,3,'',{caption:'Категория ▾'}),
    E('pill',x0+1.5,y0+10,w-3,3,'',{caption:'Город ▾'}),
    E('pill',x0+1.5,y0+14,w-3,3,'',{caption:'Возраст ▾'}),
    E('pill',x0+1.5,y0+18,w-3,3,'',{caption:'Цена ▾'}),
    E('pill',x0+1.5,y0+22,w-3,3,'',{caption:'Дата ▾'}),
    E('btn',x0+1.5,y0+27,w-3,3.4,'',{caption:'Сбросить',ghost:true})
  ];
}
function reviewBlock(x0,y0,w,h){
  return [
    E('panel',x0,y0,w,h,'Отзыв'),
    E('icon',x0+1.5,y0+1.5,4,4,'',{caption:'A'}),
    E('text',x0+7,y0+2,w-9,3.5,'',{lines:1}),
    E('star',x0+1.5,y0+7,10,3,'',{caption:'★★★★★'}),
    E('text',x0+1.5,y0+11,w-3,h-13,'',{lines:3})
  ];
}

   SCREEN DEFINITIONS
   ============================================================ */

function add(id,group,title,desc,kind,elements){
  SCREENS.push({id:id,group:group,title:title,desc:desc,kind:kind,el:elements});

/* ============================================================
   RENDER APP
   ============================================================ */
var groups = [];
SCREENS.forEach(function(s){ if(groups.indexOf(s.group)===-1) groups.push(s.group); });

function buildNav(){
  var html='';
  groups.forEach(function(g){
    html+='<div class="group-title">'+g+'</div>';
    SCREENS.filter(function(s){return s.group===g;}).forEach(function(s){
      html+='<div class="nav-item" data-id="'+s.id+'"><span class="n">'+(s.kind==='mobile'?'M':'D')+'</span>'+s.title+'</div>';
    });
  });
  html+='<div class="group-title">18 · Флоу</div>';
  FLOWS.forEach(function(f){
    html+='<div class="nav-item" data-id="'+f.id+'"><span class="n">→</span>'+f.title.replace('Флоу: ','')+'</div>';
  });
  document.getElementById('navtree').innerHTML=html;
}

function showScreen(id){
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.toggle('active', n.getAttribute('data-id')===id);});
  var s = SCREENS.find(function(x){return x.id===id;});
  var main = document.getElementById('main');
  if(s){
    main.innerHTML =
      '<div class="crumbs">'+s.group+'</div>'+
      '<div class="screen-title">'+s.title+'</div>'+
      '<div class="screen-desc">'+s.desc+'</div>'+
      '<div class="frame-wrap"><div class="frame-shell"><div class="fname">'+(s.kind==='mobile'?'Mobile · 375px':'Desktop · 1280px')+'</div>'+
      frameHtml(s.kind, s.el)+
      '</div></div>';
    return;
  }
  var f = FLOWS.find(function(x){return x.id===id;});
  if(f){
    var stepsHtml = f.steps.map(function(st,i){
      return '<div class="flow-step"><div class="mini">'+
        '<div class="wf-el wf-text" style="left:6%;top:8%;width:88%;height:70%"><div class="wf-text" style="height:100%"><div class="ln title" style="width:70%"></div><div class="ln" style="width:90%"></div><div class="ln" style="width:75%"></div></div></div>'+
        '<div class="wf-el wf-btn" style="left:6%;top:82%;width:40%;height:12%">Шаг '+(i+1)+'</div>'+
        '</div><div class="cap">'+st[0]+'</div><div class="sub">'+st[1]+'</div></div>'+
        (i<f.steps.length-1?'<div class="flow-arrow">→</div>':'');
    }).join('');
    main.innerHTML =
      '<div class="crumbs">18 · Флоу · Сквозной сценарий</div>'+
      '<div class="screen-title">'+f.title+'</div>'+
      '<div class="screen-desc">Каждый шаг — отдельный экран из левого меню; здесь — последовательность целиком, для проверки логики флоу end-to-end.</div>'+
      '<div class="flow-wrap"><div class="flow">'+stepsHtml+'</div></div>';
  }
}

document.addEventListener('click', function(e){
  var item = e.target.closest('.nav-item');
  if(item) showScreen(item.getAttribute('data-id'));
});

buildNav();
showScreen(SCREENS[0].id);
</script>
